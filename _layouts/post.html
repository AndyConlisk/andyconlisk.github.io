    <time>{{ page.date | date: "%B %-d, %Y" }}</time>

  </div>

  <footer class="post-footer">

    <p>Thanks for reading. Find me on <a href="https://github.com/{{ site.github_username }}">GitHub</a> for more projects.</p>
  </footer>
</article>
