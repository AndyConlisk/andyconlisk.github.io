<header class="site-header">
  <div class="container">
    <div class="header-content">
      <a href="/" class="site-title">
        <strong>{{ site.title }}</strong>
      </a>

      <nav class="site-nav">
        <a href="/now/">Now</a>
        <a href="/blog/">Blog</a>
        <a href="/experience/">Experience</a>
        
        <span class="divider">|</span>

        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" aria-label="GitHub">
            {% include icons.html icon="github" %}
        </a>
        <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener" aria-label="LinkedIn">
            {% include icons.html icon="linkedin" %}
        </a>

        <button class="theme-switch" aria-label="Toggle Dark Mode">
          <span class="icon-sun">☀️</span>
          <span class="icon-moon">🌙</span>
        </button>
      </nav>
    </div>
  </div>
</header>
